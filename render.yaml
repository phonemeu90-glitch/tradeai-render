services:
  - type: web
    name: tradeai-pro
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile=false && pnpm --filter @workspace/tradeai-pro run build-render && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
